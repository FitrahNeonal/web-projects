<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Spill Your Thoughts ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
        --primary: #ff006e;
        --secondary: #8338ec;
        --cyan: #06ffa5;
        --accent: #3a86ff;
        --glass: rgba(0, 0, 0, 0.4); /* Lebih gelap */
        --glass-border: rgba(255, 255, 255, 0.1);
        --bg-dark: #0a0a0f;
    }
    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        min-height: 100vh;
        /* Background gelap dengan gradient subtle */
        background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%);
        background-size: 400% 400%;
        animation: gradientShift 15s ease infinite;
        overflow-x: hidden;
        color: #fff;
        padding-bottom: 50px;
    }
    @keyframes gradientShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    
    /* Blob lebih gelap & subtle */
    .blob {
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.3; /* Lebih transparan */
        z-index: 0;
        animation: float 20s infinite ease-in-out;
        pointer-events: none;
    }
    .blob-1 {
        width: 400px;
        height: 400px;
        background: rgba(255, 0, 110, 0.4); /* Pink gelap */
        top: -100px;
        left: -100px;
    }
    .blob-2 {
        width: 300px;
        height: 300px;
        background: rgba(131, 56, 236, 0.4); /* Purple gelap */
        top: 40%;
        right: -50px;
        animation-delay: 5s;
    }
    .blob-3 {
        width: 350px;
        height: 350px;
        background: rgba(6, 255, 165, 0.3); /* Cyan gelap */
        bottom: 20%;
        left: 10%;
        animation-delay: 10s;
    }
    @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(20px, -30px) scale(1.1); }
    }
    
    .container {
        position: relative;
        z-index: 10;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    
    /* Header */
    .header {
        text-align: center;
        padding: 20px 0;
        animation: slideDown 0.8s ease;
    }
    .header h1 {
        font-size: 2.2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #fff 0%, #b8b8b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 40px rgba(255,255,255,0.2);
        letter-spacing: -1px;
    }
    .header p {
        color: rgba(255,255,255,0.7);
        font-weight: 600;
        font-size: 0.9rem;
    }
    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-30px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    /* Floating Area */
    .floating-area {
        height: 40vh;
        min-height: 250px;
        position: relative;
        overflow: hidden;
        margin: 10px 0;
        border-radius: 20px;
        border: 1px solid var(--glass-border);
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
    }
    .message-bubble {
        position: absolute;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        padding: 10px 15px;
        color: rgba(255,255,255,0.9);
        font-size: 0.85rem;
        font-weight: 600;
        max-width: 70%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        animation: floatUpSafe linear forwards;
        bottom: -50px;
    }
    @keyframes floatUpSafe {
        0% { bottom: -50px; opacity: 0; transform: scale(0.8); }
        10% { opacity: 1; transform: scale(1); }
        80% { opacity: 1; }
        100% { bottom: 85%; opacity: 0; transform: scale(0.9); }
    }
    
    /* Form */
    .form-container {
        background: var(--glass);
        backdrop-filter: blur(30px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 25px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5),
                    inset 0 0 0 1px rgba(255,255,255,0.05);
    }
    .input-group { margin-bottom: 15px; }
    .input-group label {
        display: block;
        color: rgba(255,255,255,0.8);
        font-size: 0.8rem;
        font-weight: 700;
        margin-bottom: 8px;
    }
    .input-group input,
    .input-group textarea {
        width: 100%;
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.4);
        color: white;
        font-family: inherit;
        font-size: 0.95rem;
        outline: none;
        transition: 0.3s;
    }
    .input-group input::placeholder,
    .input-group textarea::placeholder {
        color: rgba(255,255,255,0.3);
    }
    .input-group input:focus,
    .input-group textarea:focus {
        border-color: var(--cyan);
        background: rgba(0, 0, 0, 0.5);
        box-shadow: 0 0 15px rgba(6, 255, 165, 0.2);
    }
    .submit-btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        color: white;
        font-weight: 800;
        font-size: 1rem;
        cursor: pointer;
        box-shadow: 0 5px 20px rgba(255, 0, 110, 0.3);
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .submit-btn:hover {
        box-shadow: 0 8px 30px rgba(255, 0, 110, 0.5);
        transform: translateY(-2px);
    }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }
    
    /* Reviews Section */
    .reviews-section {
        margin-top: 30px;
        background: var(--glass);
        backdrop-filter: blur(30px);
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }
    .reviews-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 10px;
    }
    .reviews-title {
        font-size: 1.2rem;
        font-weight: 800;
        color: var(--cyan);
        text-shadow: 0 0 20px rgba(6, 255, 165, 0.4);
    }
    .sort-select {
        background: rgba(0,0,0,0.4);
        color: white;
        border: 1px solid rgba(255,255,255,0.1);
        padding: 8px 12px;
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.8rem;
        outline: none;
        cursor: pointer;
    }
    .sort-select option {
        background: #1a1a2e;
        color: white;
    }
    .review-card {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 16px;
        padding: 15px;
        margin-bottom: 15px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: 0.3s;
    }
    .review-card:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    .review-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }
    .reviewer-name {
        font-weight: 700;
        font-size: 0.9rem;
        color: var(--cyan);
    }
    .review-time {
        font-size: 0.7rem;
        color: rgba(255,255,255,0.4);
    }
    .review-text {
        font-size: 0.9rem;
        line-height: 1.5;
        color: rgba(255,255,255,0.8);
        margin-bottom: 12px;
    }
    .review-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid rgba(255,255,255,0.05);
        padding-top: 10px;
    }
    .like-btn {
        background: transparent;
        border: none;
        color: rgba(255,255,255,0.4);
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: 0.2s;
        padding: 5px 10px;
        border-radius: 20px;
    }
    .like-btn:hover {
        background: rgba(255,255,255,0.05);
        color: rgba(255,255,255,0.7);
    }
    .like-btn.liked {
        color: #ff006e;
        text-shadow: 0 0 10px rgba(255, 0, 110, 0.5);
    }
    .like-btn.liked span {
        animation: pop 0.3s ease;
    }
    @keyframes pop {
        50% { transform: scale(1.3); }
    }
    .empty-state {
        text-align: center;
        padding: 30px;
        color: rgba(255,255,255,0.4);
        font-style: italic;
    }
    .spinner {
        border: 3px solid rgba(255,255,255,0.1);
        border-top: 3px solid var(--cyan);
        border-radius: 50%;
        width: 20px;
        height: 20px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    /* Responsive */
    @media (max-width: 480px) {
        .header h1 { font-size: 1.8rem; }
        .floating-area { height: 35vh; }
        .container { padding: 15px; }
    }
</style>
</head>
<body>
    <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
    <div class="container">
        <div class="header">
            <h1>✨ Spill Your Thoughts ✨</h1>
            <p>Anonymous Feedback & Suggestions</p>
        </div>
        <div class="floating-area" id="floatingArea"></div>
        <div class="form-container">
            <form id="feedbackForm">
                <div class="input-group">
                    <label>Nama (Opsional)</label>
                    <input type="text" id="nameInput" placeholder="👀" maxlength="30">
                </div>
                <div class="input-group">
                    <label>Pesan Kamu *</label>
                    <textarea id="msgInput" placeholder="Saran dong, bikin apalagi, fitur kek atau apa gitu..." required maxlength="200"></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Kirim Sekarang 🚀</button>
            </form>
        </div>
        <div class="reviews-section">
            <div class="reviews-header">
                <div class="reviews-title">🔥 Wall of Fame</div>
                <select class="sort-select" id="sortSelect">
                    <option value="newest">⏰ Terbaru</option>
                    <option value="popular">❤️ Terpopuler</option>
                </select>
            </div>
            <div id="reviewsList">
                <div class="empty-state"><div class="spinner"></div><p style="margin-top:10px">Loading reviews...</p></div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ GANTI URL INI DENGAN URL DARI SHEETDB.IO ⚠️
        const SHEETDB_URL = 'https://sheetdb.io/api/v1/30zdnnx9m6sm7';
    
        const form = document.getElementById('feedbackForm');
        const submitBtn = document.getElementById('submitBtn');
        const floatingArea = document.getElementById('floatingArea');
        const reviewsList = document.getElementById('reviewsList');
        const sortSelect = document.getElementById('sortSelect');
    
        let allReviews = [];
        let currentSort = 'newest';
        let likedIds = []; // Track liked IDs locally
    
        // 1. Submit Feedback
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('nameInput').value.trim() || 'Anonim';
            const message = document.getElementById('msgInput').value.trim();
            if (!message) return;
    
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="spinner"></div>';
    
            try {
                const response = await fetch(SHEETDB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        data: {
                            name: name,
                            message: message,
                            likes: 0,
                            timestamp: new Date().toISOString()
                        }
                    })
                });
    
                if (!response.ok) throw new Error('Gagal kirim');
    
                createFloatingBubble(name, message);
                form.reset();
                loadReviews();
                alert('✨ Thanks! Pesanmu sudah dikirim!');
            } catch (error) {
                console.error(error);
                alert('Oops! Gagal kirim. Cek koneksi ya.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Kirim Sekarang 🚀';
            }
        });
    
        // 2. Floating Bubble
        function createFloatingBubble(name, text) {
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = `${name}: ${text}`;
            const randomLeft = Math.floor(Math.random() * 70) + 10;
            bubble.style.left = randomLeft + '%';
            bubble.style.animationDuration = (Math.random() * 5 + 8) + 's';
            floatingArea.appendChild(bubble);
            setTimeout(() => bubble.remove(), 13000);
        }
    
        // 3. Load Reviews
        async function loadReviews() {
            try {
                const response = await fetch(SHEETDB_URL);
                const data = await response.json();
                allReviews = data.map((item, index) => ({
                    id: item.id || index, // Gunakan ID dari sheet jika ada
                    name: item.name || 'Anonim',
                    message: item.message,
                    likes: parseInt(item.likes) || 0,
                    timestamp: new Date(item.timestamp)
                }));
                renderReviews();
            } catch (error) {
                console.error(error);
                reviewsList.innerHTML = '<div class="empty-state">Gagal load reviews 😅</div>';
            }
        }
    
        // 4. Render Reviews
        function renderReviews() {
            reviewsList.innerHTML = '';
            if (allReviews.length === 0) {
                reviewsList.innerHTML = '<div class="empty-state">Belum ada review nih. Jadilah yang pertama! 💌</div>';
                return;
            }
            let sortedReviews = [...allReviews];
            if (currentSort === 'newest') {
                sortedReviews.sort((a, b) => b.timestamp - a.timestamp);
            } else if (currentSort === 'popular') {
                sortedReviews.sort((a, b) => b.likes - a.likes);
            }
            sortedReviews.slice(0, 20).forEach(review => {
                const card = document.createElement('div');
                card.className = 'review-card';
                const timeAgo = getTimeAgo(review.timestamp);
                // Cek like dari localStorage
                const savedLikes = JSON.parse(localStorage.getItem('likedReviews') || '[]');
                const isLiked = savedLikes.includes(review.id);
                card.innerHTML = `
                    <div class="review-header">
                        <div class="reviewer-name">👤 ${escapeHtml(review.name)}</div>
                        <div class="review-time">${timeAgo}</div>
                    </div>
                    <div class="review-text">${escapeHtml(review.message)}</div>
                    <div class="review-actions">
                        <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="handleLike('${review.id}')">
                            ${isLiked ? '❤️' : '🤍'} <span>${review.likes}</span>
                        </button>
                    </div>
                `;
                reviewsList.appendChild(card);
            });
        }
        
        // 5. Handle Like (FIXED)
        window.handleLike = async (id) => {
            let likedReviews = JSON.parse(localStorage.getItem('likedReviews') || '[]');
            
            if (likedReviews.includes(id)) {
                alert('Kamu sudah like review ini! 💖');
                return;
            }
        
            const review = allReviews.find(r => r.id == id);
            if (!review) return;
        
            review.likes = (review.likes || 0) + 1;
            likedReviews.push(id);
            localStorage.setItem('likedReviews', JSON.stringify(likedReviews));
            
            renderReviews();
        };
    
        // 6. Sort Event
        sortSelect.addEventListener('change', (e) => {
            currentSort = e.target.value;
            renderReviews();
        });
    
        // Helpers
        function getTimeAgo(date) {
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            if (seconds < 60) return 'Baru saja';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m lalu`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}j lalu`;
            const days = Math.floor(hours / 24);
            return `${days}h lalu`;
        }
    
        function escapeHtml(text) {
            if (!text) return text;
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    
        // Load on start
        loadReviews();
        // Auto refresh setiap 30 detik (lebih lama agar like tidak reset)
        setInterval(loadReviews, 30000);

        // Load liked reviews from localStorage on start
        const savedLikes = localStorage.getItem('likedReviews');
        if (savedLikes) {
            likedIds = JSON.parse(savedLikes);
        }
    </script>
</body>
</html>
